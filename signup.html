<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - 10X CRM</title>

    <!-- სტილების ფაილის დაკავშირება -->
    <link rel="stylesheet" href="css/style.css">

    <!-- JavaScript ფაილების დაკავშირება defer ატრიბუტით -->
    <!-- მნიშვნელოვანია: ჯერ ვრთავთ საერთო ფუნქციებს, მერე კონკრეტული გვერდის ლოგიკას -->
    <script src="js/storage.js" defer></script>
    <script src="js/guard.js" defer></script>
    <script src="js/auth.js" defer></script>
</head>

<body>
    <div class="auth-container">
        <h2>Create 10X CRM Account</h2>

        <!-- გლობალური შეტყობინებების (Toast) კონტეინერი -->
        <div id="auth-toast" class="toast hidden"></div>

        <!-- ფორმა novalidate ატრიბუტით, რადგან ვალიდაციას ხელით, JS-ით ვაკეთებთ -->
        <form id="signup-form" novalidate>

            <!-- 1. Full Name -->
            <div class="form-group">
                <label for="reg-fullname">Full Name</label>
                <input type="text" id="reg-fullname" placeholder="John Doe">
                <span class="error-msg" id="err-fullname"></span>
            </div>

            <!-- 2. Email Address -->
            <div class="form-group">
                <label for="reg-email">Email Address</label>
                <input type="email" id="reg-email" placeholder="john@example.com">
                <span class="error-msg" id="err-email"></span>
            </div>

            <!-- 3. Company Name -->
            <div class="form-group">
                <label for="reg-company">Company Name</label>
                <input type="text" id="reg-company" placeholder="10X Tech">
                <span class="error-msg" id="err-company"></span>
            </div>

            <!-- 4. Password -->
            <div class="form-group">
                <label for="reg-password">Password</label>
                <input type="password" id="reg-password" placeholder="••••••••">
                <span class="error-msg" id="err-password"></span>
            </div>

            <!-- 5. Confirm Password -->
            <div class="form-group">
                <label for="reg-confirm">Confirm Password</label>
                <input type="password" id="reg-confirm" placeholder="••••••••">
                <span class="error-msg" id="err-confirm"></span>
            </div>

            <!-- რეგისტრაციის ღილაკი -->
            <button type="submit" id="btn-signup">Sign Up</button>
        </form>

        <p class="auth-switch">Already have an account? <a href="index.html">Log In</a></p>
    </div>

</body>

</html>
